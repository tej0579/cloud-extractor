name: Headless Extraction Pipeline Booter

on:
  repository_dispatch:
    types: [trigger_pipeline]

jobs:
  run-service:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Poll and Launch Service
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          echo "1. Checking SSH Connection..."
          for i in {1..30}; do
            if gh codespace ssh -c scaling-disco-q7x46v96gvxfjrj -- "echo SSH_READY"; then
              break
            fi
            sleep 5
          done

          echo "2. Navigating to workspace and launching start_service..."
          # FIXED: Explicitly changing directory to the repository folder before running the script
          gh codespace ssh -c scaling-disco-q7x46v96gvxfjrj -- "cd /workspaces/afsfhagfsda && chmod +x start_service.sh && bash start_service.sh"
          
      - name: Dump Remote Logs on Failure
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          echo "=== SERVER LOG ==="
          gh codespace ssh -c scaling-disco-q7x46v96gvxfjrj -- "cat /tmp/server.log || true"
          echo "=== NGROK LOG ==="
          gh codespace ssh -c scaling-disco-q7x46v96gvxfjrj -- "cat /tmp/ngrok.log || true"
          echo "=== LIVE PROCESSES ==="
          gh codespace ssh -c scaling-disco-q7x46v96gvxfjrj -- "ps aux | grep -E 'uvicorn|ngrok' | grep -v grep || true"
