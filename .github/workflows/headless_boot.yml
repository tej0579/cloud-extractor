name: Headless Extraction Pipeline Booter

on:
  repository_dispatch:
    types: [trigger_pipeline]

jobs:
  run-service:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Poll and Launch Service
        id: launch
        continue-on-error: true   # 🌟 Prevents SSH disconnects from killing the job
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          export GH_TOKEN="${{ secrets.GH_TOKEN }}"
          
          echo "1. Checking SSH Connection..."
          for i in {1..30}; do
            if gh codespace ssh -c effective-space-funicular-5v7rrpv7w6pf4v7v -- "echo SSH_READY" 2>/dev/null; then
              break
            fi
            sleep 5
          done

          echo "2. Navigating to workspace and launching start_service..."
          gh codespace ssh -c effective-space-funicular-5v7rrpv7w6pf4v7v -- "cd /workspaces/cloud-extractor && chmod +x start_service.sh && bash start_service.sh"

      - name: Stop Codespace (Always Runs)
        if: always()   # 🌟 GUARANTEES THIS RUNS NO MATTER WHAT
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          export GH_TOKEN="${{ secrets.GH_TOKEN }}"
          echo "3. Pipeline finished! Stopping Codespace from the outside..."
          gh codespace stop -c effective-space-funicular-5v7rrpv7w6pf4v7v || true
